<!DOCTYPE html>
<html>
<head>
<title>My Hotel Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Hotel Menu</h1>

<div class="menu">

<div class="item">
<img src="pizza.jpg">
<h3>Pizza</h3>
<p>₹200</p>
<input type="number" id="pizza" value="0" min="0">
</div>

<div class="item">
<img src="burger.jpg">
<h3>Burger</h3>
<p>₹120</p>
<input type="number" id="burger" value="0" min="0">
</div>

<div class="item">
<img src="dosa.jpg">
<h3>Dosa</h3>
<p>₹80</p>
<input type="number" id="dosa" value="0" min="0">
</div>

<div class="item">
<img src="noodles.jpg">
<h3>Noodles</h3>
<p>₹150</p>
<input type="number" id="noodles" value="0" min="0">
</div>

</div>

<br>

<button onclick="orderFood()">Submit Order</button>

<h2 id="bill"></h2>

<script src="script.js"></script>

</body>
</html>
